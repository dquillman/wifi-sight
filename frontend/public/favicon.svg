<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#080c08"/>
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Crosshairs -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#22c55e" stroke-opacity="0.1" stroke-width="0.75"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#22c55e" stroke-opacity="0.1" stroke-width="0.75"/>
  <!-- Sweep cone -->
  <path d="M32,32 L32,6 A26,26 0 0,1 54.5,18.5 Z" fill="#22c55e" fill-opacity="0.12"/>
  <!-- Sweep line -->
  <line x1="32" y1="32" x2="32" y2="6" stroke="#22c55e" stroke-opacity="0.8" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#22c55e"/>
  <!-- Person detection marker (orange diamond) -->
  <rect x="43" y="18" width="8" height="8" rx="1" transform="rotate(45 47 22)" fill="#ff8c00"/>
  <!-- Presence blip (red) -->
  <circle cx="20" cy="42" r="3" fill="#ef4444" fill-opacity="0.9"/>
  <circle cx="20" cy="42" r="6" fill="none" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
</svg>
